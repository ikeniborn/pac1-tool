content: 'Always validate every table identifier in generated SQL against schema table
  list before execution; block query if any unknown table referenced. Prevents hallucinated
  table names reaching DB. Example gate: extract idents from `FROM`/`JOIN` clauses,
  set-diff vs `information_schema.tables`, abort on non-empty diff.'
