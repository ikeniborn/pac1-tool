content: 'Always validate every table name in generated SQL against known schema list
  before execution; reject query if any table name not exact match. Prevents typos
  like `produts` instead of `products` causing failed cycles. Example: parse `FROM`/`JOIN`
  tokens, check each against schema; fail fast if mismatch rather than executing.'
