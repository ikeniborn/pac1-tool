content: 'Always include sku/id (or representative product columns) in SELECT for
  product-lookup tasks; never plan only aggregate queries (COUNT/SUM/AVG) when goal
  is finding products. Aggregates answer "how many" not "which". Lint sql-plan.yaml:
  if task type = product lookup and every query SELECTs only aggregates, flag it.
  Example bad: `SELECT COUNT(*) FROM products WHERE brand=''Heco''`. Example good:
  `SELECT sku, name FROM products WHERE brand=''Heco''`.'
created: '2026-05-13'
