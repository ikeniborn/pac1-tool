content: 'Always run `SELECT DISTINCT brand FROM products WHERE brand LIKE ''%<partial>%''
  LIMIT 10` in a separate earlier cycle before any exact-match `WHERE brand = ''<literal>''`
  filter. Brand strings vary (casing, suffixes, punctuation) — exact match without
  prior LIKE discovery silently returns zero rows. Cycle 1: discovery only. Cycle
  2: filter using confirmed value. Example: cycle 1 discovers `''Heco GmbH''` via
  LIKE, cycle 2 filters `WHERE brand = ''Heco GmbH''`.'
created: '2026-05-12'
eval_score: 0.35
