content: 'Always enforce empty `grounding_refs: []` in AnswerOutput when final SQL
  returns only aggregates (COUNT, SUM, AVG, etc.) with no `sku` in SELECT list. Aggregate-only
  queries produce no row-level SKUs to cite — non-empty `grounding_refs` must fail
  the pipeline. Example: `SELECT COUNT(*) FROM products WHERE brand=''Heco''` → `grounding_refs:
  []`; but `SELECT sku, COUNT(*) FROM products GROUP BY sku` permits refs.'
created: '2026-05-12'
