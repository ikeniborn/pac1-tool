raw_recommendation: 'sql-grounding.yaml: Add validation rule — if final SQL contains
  only aggregate functions (COUNT, SUM, etc.) with no sku in SELECT list, enforce
  grounding_refs: [] in AnswerOutput. Fail pipeline if grounding_refs is non-empty
  and no sku values were returned.'
