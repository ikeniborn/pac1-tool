phase: sql_plan
raw_recommendation: 'data/rules/sql-brand-lookup.yaml (new): Before any WHERE brand
  = ''<literal>'' filter, require a discovery query SELECT DISTINCT brand FROM products
  WHERE brand LIKE ''%<partial>%'' LIMIT 10 and confirm exact value. Block direct
  exact-match brand filters without prior LIKE discovery in the same plan cycle.'
