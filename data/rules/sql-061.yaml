content: 'Always validate every identifier in generated SQL against schema token list
  before execution; block query if any table or column name has edit-distance > 0
  from known schema tokens (catches typos like `prodcuts`, `product_propertis`, `value_txt`).
  Example gate: tokenize SQL, extract identifiers after `FROM`/`JOIN`/`WHERE`/`SELECT`,
  compare each to `information_schema.columns` + `information_schema.tables`; reject
  `SELECT sku FROM product_propertis WHERE ky=''diameter_mm''` because `product_propertis`
  and `ky` are not exact matches for `product_properties` and `key`.'
