content: 'Always block DDL keywords (DROP, CREATE, ALTER, TRUNCATE, RENAME) at pre-execution
  gate via token-level check on raw query string before dispatch — reject upfront,
  not after execution. Tokenize and match case-insensitive against blocklist; reject
  whole query if any token hits. Example gate: `if re.search(r''\b(DROP|CREATE|ALTER|TRUNCATE|RENAME)\b'',
  sql, re.I): raise SecurityError`. Reactive post-exec checks too late — damage done.'
