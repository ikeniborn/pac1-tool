content: Always, after any query in prior cycle returns 0 rows, restart next cycle
  with discovery-only queries (e.g. `SELECT DISTINCT model FROM products WHERE brand='X'
  LIMIT 50;` and `SELECT DISTINCT key FROM product_properties WHERE sku IN (SELECT
  sku FROM products WHERE brand='X' LIMIT 20)`) and omit the final filter/aggregation
  query until discovery confirms non-empty results — guessing model names or attribute
  keys after a 0-row hit wastes another cycle.
created: '2026-05-12'
eval_score: 0.2
id: sql-023
phase: sql_plan
raw_recommendation: 'data/rules/sql-discovery.yaml: Add rule — if ANY query in the
  previous cycle returned 0 rows, the next cycle MUST start with discovery queries
  only (SELECT DISTINCT model WHERE brand=X; SELECT DISTINCT key WHERE sku IN ...)
  and MUST NOT include the final aggregation query until discovery rows are confirmed
  non-empty.'
