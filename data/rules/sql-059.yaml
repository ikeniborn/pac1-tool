content: Always reject Learn phase when retry SQL byte-identical to prior cycle's
  query — signals rule_content had zero effect. Mark Learn failed, trigger new diagnosis
  instead of accepting noop rule. Compare normalized query strings (trim whitespace,
  lowercase keywords) across cycles; if `hash(query_n) == hash(query_n-1)`, fail learn
  and re-diagnose root cause.
