content: 'Never filter `WHERE model = ''<value>''` using a value not yet confirmed
  by prior discovery. Run `SELECT DISTINCT model FROM products WHERE brand = ''<Brand>''
  LIMIT 50` in earlier cycle, wait for result, then use exact returned string in next
  cycle''s filter. Same-cycle discovery + dependent filter = planning error: guessed
  value may not exist. Example wrong: cycle issues both `SELECT DISTINCT model FROM
  products WHERE brand=''Heco''` and `SELECT ... WHERE brand=''Heco'' AND model=''TopFix
  GTU''` together. Correct: cycle 1 returns `''TopFix GTU-YPJ''`, cycle 2 filters
  `model = ''TopFix GTU-YPJ''`.'
created: '2026-05-12'
