phase: sql_plan
raw_recommendation: 'data/rules/sql-discovery-dependency.yaml (new): Require that
  any query containing WHERE model = ''<value>'' must reference a prior cycle''s discovery
  result that confirmed that exact value; flag same-cycle discovery + dependent filter
  as a planning error.'
