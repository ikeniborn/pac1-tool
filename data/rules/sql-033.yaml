content: 'Never trigger full Learn cycle for trivial identifier typos. Table/column
  name misspellings detectable from schema must raise hard pre-execution validation
  error citing nearest schema match. Reserve Learn cycles for semantic or data-shape
  failures (wrong join key, empty result from bad filter, type mismatch). Example:
  query `SELECT sku FROM product_propertys WHERE keyy=''diameter_mm''` → fail fast
  with "unknown table product_propertys (did you mean product_properties?), unknown
  column keyy (did you mean key?)" before execution, no Learn invoked.'
created: '2026-05-12'
