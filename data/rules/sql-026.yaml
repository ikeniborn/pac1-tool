content: 'Never fabricate `grounding_refs` when SQL phase returns zero rows or no
  `sku` column. Always set `grounding_refs: []` in sql-answer.yaml output when result
  set empty or lacks sku column — never invent SKU values to fill array. Example:
  query `SELECT sku FROM products WHERE brand=''X''` returns 0 rows → emit `grounding_refs:
  []`, not guessed SKUs from training data.'
