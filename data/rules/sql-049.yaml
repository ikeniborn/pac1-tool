content: 'Always wrap free-text TEXT column comparisons in `LOWER()` on both sides
  (or use `ILIKE`/`LIKE` with case-insensitive collation) when matching against user-supplied
  task input — exact `=` comparison silently returns zero rows on case mismatch. Example:
  `WHERE LOWER(type) = LOWER(''Wood Screw'')` instead of `WHERE type = ''Wood Screw''`.'
created: '2026-05-13'
eval_score: 0.1
id: sql-049
phase: sql_plan
raw_recommendation: 'sql-case-sensitivity.yaml: Add rule requiring LOWER(type) = LOWER(?)
  or LIKE pattern when matching TEXT columns to free-text task input, preventing case-mismatch
  silent failures.'
