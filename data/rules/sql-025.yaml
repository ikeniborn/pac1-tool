content: 'Always flag unresolved variables in task text (literal placeholders like
  `X`, `<value>`, `?`) during SQL planning — surface ambiguity in reasoning and request
  clarification rather than silently substituting defaults. Example: task "find products
  where diameter_mm = X" must return clarification request, not `WHERE value_number
  = 1`.'
