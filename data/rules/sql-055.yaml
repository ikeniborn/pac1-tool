content: 'Always normalize case when filtering TEXT columns where casing may vary:
  wrap both sides with `LOWER()` (e.g. `WHERE LOWER(type) = LOWER(''Wood Screw'')`)
  or use a case-insensitive collation. Prevents silent empty results from case mismatch.'
