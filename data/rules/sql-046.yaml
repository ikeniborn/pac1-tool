content: 'Never let SqlPlan re-execute query identical to prior cycle. Set `max_identical_cycles:
  1` in sql-retry.yaml (or equivalent retry config) — on duplicate emission, skip
  execution and force Learn step to produce structurally different query (new filters,
  different attribute keys, alternate join shape) or escalate to user clarification.
  Prevents infinite loops where retry harness re-runs same failing SQL.'
created: '2026-05-13'
