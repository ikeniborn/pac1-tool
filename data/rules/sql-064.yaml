content: 'Always block identical SQL retry across cycles. Add `sql-plan-retry.yaml`
  gate: when `cycle > 1`, diff `SqlPlanOutput.queries` against prior cycle; reject
  if normalized set equal (strip whitespace/comments, lowercase keywords) — identical
  retry wastes cycle without new info. Force planner to mutate filter, attribute key,
  or candidate column before resubmit. Example check: `assert normalize(queries[cycle])
  != normalize(queries[cycle-1])` else fail gate with reason `"identical_retry"`.'
created: '2026-05-13'
