content: 'Always ground WHERE-clause literals in evidence: task text, prior query
  result, or explicit enumeration (`SELECT DISTINCT <col> FROM products WHERE <narrow>
  LIMIT 50`). Never invent filter values from prior knowledge or guess spellings/units.
  If literal not traceable, run enumeration first, then filter. Example: before `WHERE
  finish = ''matte black''`, confirm via `SELECT DISTINCT finish FROM products WHERE
  brand=''Heco'' LIMIT 50` — actual value may be `''Matte Black''` or `''black-matte''`.'
created: '2026-05-12'
