content: 'Never put dependent queries in same SqlPlan batch. Each query in batch must
  run independently — no query can reference value another query in same batch returns.
  If query B needs result from query A (e.g., sku discovered by A, attribute key confirmed
  by A), defer B to next cycle. Example wrong: batch contains `SELECT sku FROM products
  WHERE model=''X''` AND `SELECT * FROM product_properties WHERE sku=''<from prev>''`.
  Right: run discovery query alone, then dependent query next cycle.'
