raw_recommendation: 'sql-filter-grounding.yaml: Add a rule requiring that any literal
  value used in a WHERE clause must be traceable to either the task text, a prior
  SQL result, or an explicit enumeration query; block queries where the filter literal
  is not evidenced.'
