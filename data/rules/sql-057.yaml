content: 'Always validate table names against schema tables list at plan phase — reject
  query if name not exact match, surface as plan error (not execution error). Catches
  typos/hallucinated tables before SQL runs. Example: planner sees `FROM product_propertys`
  → fail fast with "unknown table ''product_propertys''; valid: products, product_properties"
  instead of letting DB throw at execution.'
