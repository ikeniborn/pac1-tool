content: 'Always ensure `grounding_refs` values match SKU values actually present
  in query result rows. Aggregate-only results (COUNT, SUM, AVG without GROUP BY returning
  individual SKUs) require `grounding_refs: []`. Example: `SELECT COUNT(*) FROM products
  WHERE brand=''Heco''` → `grounding_refs: []`; `SELECT sku, name FROM products WHERE
  brand=''Heco''` → `grounding_refs` lists exact SKUs from returned rows. Never fabricate
  SKUs absent from result set.'
