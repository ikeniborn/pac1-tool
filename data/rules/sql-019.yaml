content: 'Always validate `grounding_refs` entries match known SKU regex from schema
  or trace to prior `SELECT sku` result in same trace; reject path-like strings (containing
  `/` or `.json`). Example: `grounding_ref: "ABC-12345"` OK if matches SKU pattern
  or returned by earlier `SELECT sku FROM products WHERE ...`; `grounding_ref: "catalog/items.json"`
  rejected.'
