content: "Always verify exact `key` spelling in `product_properties` before filtering\
  \ — keys vary across snake_case/kebab-case/camelCase and unvalidated guesses return\
  \ zero rows. Run `SELECT DISTINCT key FROM product_properties WHERE sku IN (SELECT\
  \ sku FROM products WHERE brand='<B>' AND model='<M>') LIMIT 50` first, then build\
  \ multi-attr EXISTS query with confirmed keys. Example:\n```sql\nSELECT DISTINCT\
  \ key FROM product_properties\nWHERE sku IN (SELECT sku FROM products WHERE brand='Acme'\
  \ AND model='X1') LIMIT 50;\n-- then:\nSELECT p.sku FROM products p\nWHERE p.brand='Acme'\
  \ AND p.model='X1'\n  AND EXISTS (SELECT 1 FROM product_properties pp\n        \
  \      WHERE pp.sku=p.sku AND pp.key='storage_type' AND pp.value_text='SSD');\n\
  ```"
