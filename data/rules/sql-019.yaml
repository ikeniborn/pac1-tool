raw_recommendation: 'sql-grounding.yaml: Add validation rule — grounding_refs values
  must match regex pattern of known sku formats from schema, or must be traceable
  to a SELECT sku result in the same trace. Reject path-like strings (containing ''/''
  or ''.json'') as grounding_refs.'
