content: 'Always case-insensitive match TEXT product type columns. Mixed-case data
  miss rows on exact `=`. Use `LOWER(type) = LOWER(?)` or `type COLLATE NOCASE = ?`.
  Example: `SELECT sku FROM products WHERE LOWER(type) = LOWER(''Wood Screw'')`.'
