raw_recommendation: 'sql-text-match.yaml (new or existing): Add rule requiring case-insensitive
  match for TEXT columns containing product types — enforce LOWER(type)=LOWER(?) or
  type COLLATE NOCASE to prevent missed rows from mixed-case data.'
