content: 'Always change at least one predicate when retrying after a zero-row result.
  Cycle 1 returning 0 rows means Learn phase must produce a new query with a meaningfully
  different predicate — swap `=` for case-insensitive `LIKE`, wrap both sides in `LOWER()`,
  or target an alternate column. Re-running the identical query is a hard failure.
  Example: if `WHERE model = ''Rugged 3EY-11K''` returns 0 rows, retry as `WHERE LOWER(model)
  LIKE LOWER(''%Rugged 3EY-11K%'')` or try `WHERE LOWER(name) LIKE ''%rugged%3ey-11k%''`.'
