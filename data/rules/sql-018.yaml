content: 'Use single COUNT-with-subquery as final query when filters precise (brand/model/EXISTS
  confirmed); skip defensive LIKE-enumeration fallbacks in same plan unless COUNT
  returns 0. Saves round-trips. Example: `SELECT COUNT(*) FROM products p WHERE p.brand=''Heco''
  AND p.model=''TopFix GTU-YPJ'' AND EXISTS (SELECT 1 FROM product_properties pp WHERE
  pp.sku=p.sku AND pp.key=''diameter_mm'' AND pp.value_number=3);` — only add `...
  WHERE name LIKE ''%...%''` probe in follow-up cycle if count is 0.'
