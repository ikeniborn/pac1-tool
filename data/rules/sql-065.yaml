content: 'Always match table names exactly to DDL tokens — zero edit-distance. Before
  emitting query, verify each table identifier char-for-char against schema; if differs
  (e.g. `product` vs `products`, `product_property` vs `product_properties`), do not
  emit — re-check schema first. Example: schema has `product_properties` → never write
  `FROM product_property pp`; write `FROM product_properties pp`.'
