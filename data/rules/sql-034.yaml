content: 'Never emit SQL containing DDL/DML keywords (DROP, CREATE, ALTER, TRUNCATE,
  DELETE, UPDATE, INSERT) — read-only SELECT only. Pattern-match planned query against
  these keywords before dispatch; if matched, reject and restart planning. Example:
  reject `DELETE FROM products WHERE sku=''X''`; rewrite as `SELECT sku FROM products
  WHERE sku=''X''` to inspect instead.'
