content: 'Never put path-like strings in `grounding_refs`. Values must match SKU pattern
  from DB schema (alphanumeric + hyphens only); reject any value starting with `/`
  or containing path separators (`/`, `\`). Validate before emitting refs — paths
  like `/catalog/foo` are category paths, not SKUs. Example: `grounding_refs: [''ABC-123'',
  ''XY-9K'']` ✓; `grounding_refs: [''/screws/wood'']` ✗.'
