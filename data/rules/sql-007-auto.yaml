content: Never add a LIKE or any text-matching filter to the model-discovery query
  (`SELECT DISTINCT model FROM products WHERE brand='<brand>' LIMIT 50`). Run it with
  the brand constraint only, inspect all returned codes, then pick the exact match
  for the subsequent filter. Adding `AND model LIKE '%...'` to the discovery step
  hides codes that do not match the pattern and guarantees a false-empty result.
