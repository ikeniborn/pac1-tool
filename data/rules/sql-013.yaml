content: 'Never emit SQL matching DDL/DML write patterns (`^\s*(DROP|CREATE|ALTER|TRUNCATE|INSERT|UPDATE|DELETE)`).
  Read-only `SELECT` only. Pre-execution regex gate (sql-sec-001) blocks query before
  executor, returns BLOCKED + gate ID. Example rejected: `DELETE FROM products WHERE
  sku=''X''`. Example allowed: `SELECT sku FROM products WHERE brand=''Heco''`.'
created: '2026-05-12'
eval_score: 0.1
id: sql-013
phase: sql_plan
raw_recommendation: 'sql-sec-001.yaml: Add pre-generation pattern match list: [''^\s*DROP'',
  ''^\s*CREATE'', ''^\s*ALTER'', ''^\s*TRUNCATE'', ''^\s*INSERT'', ''^\s*UPDATE'',
  ''^\s*DELETE'']. Gate must fire before query reaches executor, returning immediate
  BLOCKED status with gate ID.'
source: eval
verified: false
