content: 'Never cite column names or values in `reasoning` field unless present in
  current query''s returned rows. Prohibit referencing data from prior session knowledge,
  cached context, or inferred schema not visible in actual result set. Each citation
  must trace to row+column in returned output. Example: if query `SELECT name, status
  FROM users WHERE id=5` returns `(''Alice'',''active'')`, reasoning may cite `name=''Alice''`
  and `status=''active''` but NOT `email`, `created_at`, or values from earlier queries
  — re-query if needed.'
