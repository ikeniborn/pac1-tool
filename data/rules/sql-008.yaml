content: 'Always enforce grounding_ref↔SQL-result SKU match in answer-grounding.yaml:
  each `grounding_ref` must equal a `sku` present in current session''s SQL result
  payload, and fail `OUTCOME_OK` when `grounding_refs` non-empty but query returned
  zero SKUs. Prevents fabricated citations. Example check: `SELECT sku FROM products
  WHERE ...` → cache returned sku set S; gate passes iff `set(grounding_refs) ⊆ S`
  and (`grounding_refs == [] OR len(S) > 0`).'
