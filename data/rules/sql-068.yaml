content: 'Always validate `grounding_refs` against SQL result SKUs before answer phase
  — each ref must match a `sku` value returned by the query; unmatched refs reject
  the answer and trigger re-plan. Prevents hallucinated SKU citations. Example: if
  query returns SKUs `{A1, B2}` and answer cites `C3`, reject and re-plan.'
