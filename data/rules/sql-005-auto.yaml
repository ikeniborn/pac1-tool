content: 'Always verify exact brand name before filtering: run `SELECT DISTINCT brand
  FROM products WHERE brand LIKE ''%<user-supplied-brand>%'' LIMIT 20` as the very
  first query in any session, and use only the returned exact string in all subsequent
  WHERE brand = ''...'' clauses.'
