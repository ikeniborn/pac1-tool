content: Never repeat identical SqlPlan queries across cycles. If cycle N+1 queries
  match cycle N exactly with no rule change, abort with OUTCOME_FAIL — identical retry
  without new constraint is a bug, not progress. Before emitting plan, diff against
  prior cycle; if `set(queries_n+1) == set(queries_n)` and no new rule added, halt.
