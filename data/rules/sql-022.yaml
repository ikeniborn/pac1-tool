phase: sql_plan
raw_recommendation: 'data/rules/sql-001.yaml (or new): Add schema-validation gate
  — before query execution, tokenize table/column identifiers and diff against schema;
  block queries referencing unknown identifiers with RULE_VIOLATION rather than allowing
  DB-level error + Learn round-trip.'
