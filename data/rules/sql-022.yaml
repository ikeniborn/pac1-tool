raw_recommendation: 'data/rules/sql-inventory-projection.yaml (new): Inventory queries
  must SELECT available_today. Queries that GROUP BY store_id without SUM(available_today)
  or that omit available_today from SELECT are flagged as incomplete and must be retried.'
