content: 'Always include `available_today` in inventory queries. SELECT must list
  it; any GROUP BY store_id must aggregate it via `SUM(available_today)`. Omitting
  = incomplete, retry. Example: `SELECT store_id, SUM(available_today) AS qty FROM
  inventory WHERE sku = ''ABC'' GROUP BY store_id;`'
created: '2026-05-12'
