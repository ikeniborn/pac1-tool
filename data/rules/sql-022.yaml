content: 'Always validate table/column identifiers against schema before executing
  SQL. Tokenize query, diff identifiers vs known schema, reject unknown refs with
  RULE_VIOLATION upfront — skip DB error + Learn round-trip. Example: query `SELECT
  sku FROM product_props WHERE keyy=''x''` → reject (`product_props`, `keyy` not in
  schema; suggest `product_properties`, `key`) before sending to DB.'
created: '2026-05-12'
