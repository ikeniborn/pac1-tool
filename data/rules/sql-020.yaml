content: 'Never put path-like strings (starting with `/` or containing `.json`) in
  `grounding_refs` — values must exactly match a `sku` from most recent SQL result
  set. Example: if query returned `sku=''HEC-4421''`, use `grounding_refs: [''HEC-4421'']`,
  not `[''/products/heco-4421.json'']` or `''products/HEC-4421''`.'
