content: 'Never include path separators or URL fragments in `grounding_refs`. Refs
  must match SKU format from result set only — reject any value containing `/proc/`,
  `/catalog/`, or `/`. Validate each ref against returned `sku` column before emitting.
  Example: if query returns `sku=''ABC-123''`, valid ref is `"ABC-123"`, not `"/catalog/ABC-123"`
  or `"products/ABC-123"`.'
created: '2026-05-12'
