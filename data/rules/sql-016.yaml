content: 'Always distinguish two null cases when `count=0` and `grounding_refs` empty:
  add note clarifying whether queried kinds/categories exist in DB but have zero matching
  products, vs. kinds not found at all. Run a discovery query (e.g. `SELECT DISTINCT
  category FROM products WHERE category ILIKE ''%<kind>%'' LIMIT 10`) before final
  count query; if discovery returns rows but count=0 → "kind exists, no products match
  filters"; if discovery empty → "kind not in DB". Never emit bare `count=0` without
  this disambiguation.'
