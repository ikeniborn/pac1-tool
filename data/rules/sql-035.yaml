content: 'Never repeat identical query across Learn cycles. If cycle N+1 SQL matches
  cycle N SQL byte-for-byte, Learn phase failed — abort with OUTCOME_FAIL instead
  of silent re-run. Hash prior query, compare before dispatch; on match emit failure.
  Example: `if sha256(sql_n1) == sha256(sql_n): raise LearnFailure("OUTCOME_FAIL:
  no progress")`.'
