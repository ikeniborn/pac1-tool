content: 'Always validate `grounding_ref` values match sku format (alphanumeric product
  codes present in actual SQL result set); reject refs containing filesystem paths
  (`/proc`, `/etc`, `/var`), URLs, or any value absent from returned rows. Example:
  after `SELECT sku, name FROM products WHERE ...`, build allowed-set from returned
  `sku` column and check each ref ∈ set via regex `^[A-Za-z0-9._-]+$` before emitting.'
