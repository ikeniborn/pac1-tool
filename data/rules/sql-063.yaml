content: 'Never accept grounding_ref values matching filesystem path patterns (`^/proc/`,
  `^/etc/`, or any absolute path starting with `/`); grounding_ref must match a sku
  value returned by the query''s SELECT on the `sku` column. Validate refs against
  the result set, reject path-like strings outright. Example: `SELECT sku, name FROM
  products WHERE brand=''Heco''` — valid grounding_ref is a returned sku like `HC-4421`,
  not `/etc/passwd` or `/proc/self`.'
