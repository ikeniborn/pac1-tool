content: 'Always validate grounding_ref format match `/catalog/{sku}` where sku exist
  in SQL result set. Reject `/proc/` or arbitrary paths. Example: SQL returns sku
  `ABC123` → ref `/catalog/ABC123` OK, `/proc/ABC123` or `/docs/foo` reject.'
