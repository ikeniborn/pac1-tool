content: 'Always ground every WHERE clause literal in either the task input text or
  a prior SQL result — never invent filter values. Before writing a query, trace each
  literal (brand, model, attribute key, attribute value, numeric threshold) back to
  its source: user prompt, schema probe (`SELECT DISTINCT ...`), or earlier result
  row. If literal lacks textual basis, stop and probe first. Example: task says "3mm
  wood screws" → `pp.key=''diameter_mm'' AND pp.value_number=3` traces to "3mm"; but
  `pp.key=''thread_pitch'' AND pp.value_number=0.5` has no source — drop it or run
  `SELECT DISTINCT key FROM product_properties WHERE sku IN (...)` first.'
