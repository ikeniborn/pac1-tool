content: 'Always gate query plans: reject if any WHERE-clause string literal absent
  from original task_text (case-insensitive, after trimming quotes). Stops hallucinated
  filter values. Example: task says "find Heco TopFix screws"; plan `WHERE brand=''Heco''
  AND model=''TopFix GTU-YPJ'' AND category=''Lawn Mower''` — reject, ''Lawn Mower''
  and ''TopFix GTU-YPJ'' not in task_text. Allow literals only if exact substring
  match in task_text, or sourced from prior `SELECT DISTINCT` probe result in session.'
created: '2026-05-13'
