content: 'Always validate `grounding_refs` post-answer against SKU regex derived from
  query result set; fail answer phase if any ref contains path separators (`/`, `\`)
  or non-SKU strings. Example: after running `SELECT sku FROM products WHERE ...`,
  build allowed-set from result `sku` column and reject answer if `any(ref not in
  allowed_skus or re.search(r''[\\/]'', ref) for ref in grounding_refs)`.'
