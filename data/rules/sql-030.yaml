phase: sql_plan
raw_recommendation: 'Add rule sql-ambiguous-task.yaml: when task text contains unresolved
  placeholders (single uppercase letters, ''X'', ''?''), block query execution and
  require clarification before proceeding — prevents planner from silently assuming
  filter values'
