content: 'Always halt SQL planning when task text has unresolved placeholders (lone
  uppercase letters like `X`, `Y`, `?`, or bracketed tokens like `<value>`); ask user
  for concrete value before emitting query. Never substitute guesses for missing filter
  operands. Example: task "find screws diameter X mm" → stop, ask "which diameter?",
  do not emit `WHERE pp.value_number = 0` or pick arbitrary number.'
created: '2026-05-12'
