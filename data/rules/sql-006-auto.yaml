content: Always run `SELECT DISTINCT model FROM products WHERE brand='<brand>' LIMIT
  50` before filtering by model name — never assume the model column contains the
  full human-readable product line description; it typically holds only the short
  model code (e.g. 'GTU-YPJ', not 'Heco Zinc Plated TopFix GTU-YPJ Wood and Drywall
  Screw').
