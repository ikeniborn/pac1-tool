phase: sql_plan
raw_recommendation: 'sql-sec-001.yaml: add pre-execution gate at PLAN phase, not only
  execution phase — regex match on query string for DDL keywords (DROP, CREATE, ALTER,
  TRUNCATE, INSERT, UPDATE, DELETE) before query leaves SqlPlanOutput. Gate should
  return error_type=security and skip LearnOutput entirely, looping back to SqlPlanOutput
  with injected rule.'
