content: 'Always block DDL/DML at PLAN phase, not only execution. In SqlPlanOutput,
  regex-scan query for `DROP|CREATE|ALTER|TRUNCATE|INSERT|UPDATE|DELETE` (case-insensitive,
  word-boundary) before query exits planner. On match: emit `error_type=security`,
  skip LearnOutput, loop back to SqlPlanOutput with injected read-only rule. Example
  guard: `if re.search(r''\b(DROP|CREATE|ALTER|TRUNCATE|INSERT|UPDATE|DELETE)\b'',
  sql, re.I): raise SecurityError`. Planner stay SELECT-only.'
created: '2026-05-12'
eval_score: 0.2
