content: 'Always gate schema enumeration queries (`information_schema.*`, `pg_catalog.*`,
  `sqlite_master`, `sys.*`) behind explicit allow rule sql-sec-002 — block by default
  since schema introspection leaks table/column names beyond user intent. Example:
  `SELECT table_name FROM information_schema.tables` must require gate pass before
  execution; prefer fixed schema doc lookup over runtime enumeration.'
