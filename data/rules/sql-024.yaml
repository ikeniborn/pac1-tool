phase: sql_plan
raw_recommendation: 'Add or strengthen rule in sql-grounding.yaml (or equivalent):
  grounding_refs values must match sku strings returned by the most recent SQL SELECT;
  validator should reject any ref containing ''/'' or not present in the result set'
