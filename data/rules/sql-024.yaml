content: 'Never mix discovery and filter/aggregation phases in one SqlPlanOutput —
  emit either discovery queries (SELECT DISTINCT, schema probes) OR final filter/aggregation
  queries (WHERE-filtered SELECT, COUNT, SUM), never both in same plan. COUNT/aggregation
  depends on confirmed keys+values from discovery, so combining wastes cycle when
  discovery reveals wrong assumption. Example violation: `SELECT DISTINCT model FROM
  products WHERE brand=''Heco''` + `SELECT COUNT(*) FROM products WHERE brand=''Heco''
  AND model=''TopFix GTU-YPJ''` in same output. Correct: discovery plan first, then
  aggregation plan next cycle once values confirmed.'
created: '2026-05-12'
