content: 'Never emit `grounding_refs` values not present in the most recent SQL SELECT
  result set. Each ref must match a `sku` string exactly — reject refs containing
  ''/'' (path fragments) or any value absent from returned rows. Validator should
  cross-check refs against the last query''s `sku` column before accepting output.
  Example: if `SELECT sku, name FROM products WHERE ...` returns `[''ABC123'',''XYZ789'']`,
  then `grounding_refs: [''ABC123'']` valid, but `grounding_refs: [''products/ABC123'']`
  or `grounding_refs: [''DEF456'']` reject.'
created: '2026-05-12'
