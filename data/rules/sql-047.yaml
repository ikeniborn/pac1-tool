content: 'Always gate generated SQL with pre-execution regex `^\s*(DROP|CREATE|ALTER|INSERT|UPDATE|DELETE|TRUNCATE)\b`
  (case-insensitive) to block dispatch and trigger LEARN before query runs — never
  rely on LLM self-enforcement of read-only/DDL prohibition. Example: reject `DELETE
  FROM products WHERE sku=''x''` at gate, log violation, skip execution. Apply gate
  after whitespace/comment strip to defeat `/* */ DROP` bypass.'
created: '2026-05-13'
