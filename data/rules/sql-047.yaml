raw_recommendation: 'sql-sec-001.yaml: Add a pre-execution regex gate on generated
  query strings — pattern `^\s*(DROP|CREATE|ALTER|INSERT|UPDATE|DELETE|TRUNCATE)`
  should block dispatch and trigger LEARN immediately without running the query. Do
  not rely on LLM self-enforcement of DDL prohibition.'
