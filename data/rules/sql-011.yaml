content: 'Always validate table/column tokens in candidate SQL against schema identifier
  list before emit; block query if any identifier has edit-distance ≥ 1 from known
  names and self-correct first, avoiding wasted LEARN round-trip. Example: query `SELECT
  sku FROM product_propertys WHERE keyy=''x''` — gate flags `product_propertys` (vs
  `product_properties`) and `keyy` (vs `key`), forces rewrite to `SELECT sku FROM
  product_properties WHERE key=''x''` before submission.'
created: '2026-05-12'
eval_score: 0.1
id: sql-011
phase: sql_plan
raw_recommendation: 'sql-spelling.yaml: Add a pre-emit gate that diffs all table/column
  tokens in a candidate query against the schema identifier list and blocks submission
  if edit-distance ≥ 1 from any known identifier, prompting self-correction before
  a LEARN round-trip.'
