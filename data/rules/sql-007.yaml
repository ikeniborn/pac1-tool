content: 'Always lint every identifier in generated SQL against provided schema before
  emit; block query if any table or column name absent from schema. Catches typos
  like `produts` vs `products` or `prodcut_properties.sku` pre-execution. Example:
  parse `SELECT p.sku FROM produts p WHERE p.brand=''Heco''` → `produts` not in schema
  → reject, suggest `products`.'
