content: 'Always validate `grounding_refs` against strict SKU regex — reject filesystem
  paths (`^/`), URLs (`^https?://`), and any value not traceable to SKU column from
  SQL results. Only SKUs returned by executed query qualify as grounding. Example
  check: `grounding_ref MATCHES ''^[A-Z0-9-]+$'' AND grounding_ref IN (SELECT sku
  FROM <last_query_results>)`. Catches hallucinated paths like `/products/foo` masquerading
  as evidence.'
