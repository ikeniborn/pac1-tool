content: 'Always ensure `grounding_refs` values match at least one `sku` from most
  recent SQL result set. Reject path-like strings (contain `/` or `.json`) as invalid
  refs. Example: if last query returned `sku IN (''ABC123'',''DEF456'')`, valid ref
  is `''ABC123''`, not `''products/ABC123.json''`.'
