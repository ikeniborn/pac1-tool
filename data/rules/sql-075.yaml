content: 'Always normalize case when filtering TEXT columns: wrap both sides in `LOWER()`
  (portable) or use `ILIKE` (Postgres) — never rely on raw `=` or `LIKE` for user-supplied
  strings unless case-exact match is documented intent. Example: `WHERE LOWER(brand)
  = LOWER(''Heco'')` or `WHERE brand ILIKE ''heco''`. Prevents silent miss on `''HECO''`
  vs `''Heco''`.'
