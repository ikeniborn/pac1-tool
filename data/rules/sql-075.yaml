content: 'Always normalize case when filtering TEXT columns using `LOWER()` on both
  sides — do not rely on raw `=` for user-supplied strings. The DB is SQLite: ILIKE
  is not supported. Use `WHERE LOWER(brand) = LOWER(''Heco'')` for exact match, or
  `WHERE brand LIKE ''%heco%''` for fuzzy match (SQLite LIKE is case-insensitive for
  ASCII by default). Prevents silent miss on ''HECO'' vs ''Heco''.'
