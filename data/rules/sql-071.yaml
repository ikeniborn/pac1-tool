content: 'Always verify every table name token in query exactly matches a table in
  provided schema before execution; reject query on any mismatch rather than catching
  post-execution error. Example: query `SELECT * FROM product_propertys WHERE sku=''X''`
  must fail pre-flight since schema lists `product_properties`, not `product_propertys`.'
created: '2026-05-13'
eval_score: 0.2
id: sql-071
phase: sql_plan
raw_recommendation: 'Add rule sql-table-spelling.yaml: gate that rejects any query
  where a table name token does not exactly match a table name in the provided schema
  — fire before execution, not after'
