content: 'Always validate every grounding_ref against the SKUs returned by the SQL
  result set before emitting AnswerOutput; reject any ref whose sku is not present
  in the result rows. Example: after running `SELECT sku, name FROM products WHERE
  ...`, build `valid_skus = {row.sku for row in result}` and drop any `grounding_ref.sku
  not in valid_skus` — never cite a SKU the query did not return.'
