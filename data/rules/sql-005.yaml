content: 'Always normalize TEXT equality on human-entered category columns: wrap both
  sides in `LOWER()` or use `ILIKE`, else reject query. Bare `=` on free-text categories
  misses case variants. Example: `WHERE LOWER(category) = LOWER(''Wood Screw'')` or
  `WHERE category ILIKE ''wood screw''` instead of `WHERE category = ''Wood Screw''`.'
