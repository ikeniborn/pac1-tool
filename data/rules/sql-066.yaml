content: 'Always populate `grounding_refs` with SKU strings taken directly from prior
  SELECT result rows — never file paths, catalog paths, or JSON pointers. Reject any
  ref starting with `/` or containing `.json`. Example: after `SELECT sku, name FROM
  products WHERE brand=''Heco'' AND model=''TopFix GTU-YPJ''`, set `grounding_refs:
  ["HEC-4031128", "HEC-4031129"]`, not `["/catalog/heco/topfix.json"]`.'
