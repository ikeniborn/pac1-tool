content: Never include the brand name as a prefix in the `model` column filter. The
  `brand` column holds the brand separately; `model` contains only the bare model
  string (e.g., use `model = 'Professional Advance 1PO-W67'`, not `model = 'Shell
  Professional Advance 1PO-W67'`). Always verify actual `model` values with `SELECT
  DISTINCT model FROM products WHERE brand = '<Brand>' LIMIT 20` before filtering.
