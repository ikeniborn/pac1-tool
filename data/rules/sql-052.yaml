phase: sql_plan
raw_recommendation: 'data/rules/sql-sec-001.yaml: Add pre-generation refusal pattern
  — include regex blocklist [''^\s*DROP'', ''^\s*CREATE'', ''^\s*INSERT'', ''^\s*UPDATE'',
  ''^\s*DELETE'', ''^\s*ALTER'', ''^\s*TRUNCATE''] that causes the harness to reject
  the LLM output before execution rather than relying solely on prompt instruction;
  prompt-only gates are bypassable'
