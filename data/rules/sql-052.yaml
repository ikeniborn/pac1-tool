content: 'Always enforce pre-generation regex blocklist on LLM SQL output to reject
  non-SELECT statements before execution; prompt-only gates bypassable. Block pattern
  `^\s*(DROP|CREATE|INSERT|UPDATE|DELETE|ALTER|TRUNCATE)\b` (case-insensitive) at
  harness layer, refuse query if match. Example: LLM emits `DROP TABLE products` →
  harness regex match → reject, never execute. Belt-and-suspenders: keep prompt instruction
  plus hard output filter.'
created: '2026-05-13'
