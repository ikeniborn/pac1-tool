content: 'Always validate `grounding_refs` against current cycle''s SQL result SKUs
  before emitting AnswerOutput; reject any ref not in returned sku set (blocks filesystem
  paths and fabricated SKUs). Gate in sql-grounding.yaml must diff `AnswerOutput.grounding_refs`
  ⊆ `SELECT sku` rows from latest query. Example: if SQL returned `(''SKU-1'',''SKU-2'')`,
  refs like `/path/file.md` or `SKU-9` fail gate and AnswerOutput rejected.'
