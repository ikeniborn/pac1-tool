raw_recommendation: 'data/rules/sql-plan.yaml: Add guard — if key-discovery query
  returns zero rows AND model filter was used, block progression to final filter;
  require a series/model enumeration query first. Encode the rule produced in LearnOutput
  as a named rule: ''empty-discovery-implies-bad-model-filter''.'
