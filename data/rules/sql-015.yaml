content: 'Always treat zero-row key-discovery result under a brand+model filter as
  signal that model string wrong, not that attribute missing. Stop. Do not emit final
  EXISTS filter query. Enumerate models first: `SELECT DISTINCT model FROM products
  WHERE brand=''<Brand>'' LIMIT 50`, then re-run key discovery with corrected model
  before planning final filter.'
