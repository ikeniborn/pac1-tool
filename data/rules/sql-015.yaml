content: Always add post-plan check in sql-plan.yaml comparing cycle N query list
  to cycle N-1; if identical after Learn cycle, fail fast with "Learn produced no
  change — escalate" instead of re-running same query. Prevents silent infinite loops
  when Learn step yields no schema/filter refinement.
created: '2026-05-12'
eval_score: 0.1
id: sql-015
phase: sql_plan
raw_recommendation: 'sql-plan.yaml: add a post-plan check that compares cycle N and
  cycle N-1 query lists; if identical after a Learn cycle, fail fast with ''Learn
  produced no change — escalate'' instead of silently re-executing the same query'
source: eval
