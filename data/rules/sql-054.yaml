content: 'Always validate `grounding_refs` values match SKU regex `^[A-Z0-9\-]+$`
  before answer phase; reject any value containing `/`, `.`, `\`, or `proc` (filesystem/path
  artifacts leaking into refs). Fail validation early — do not emit answer with malformed
  refs. Example: `grounding_refs: ["ABC-123", "XYZ-9"]` pass; `["/proc/self", "a.b",
  "C:\\x"]` fail.'
