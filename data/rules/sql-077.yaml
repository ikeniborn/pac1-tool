content: 'The query backend is SQLite. Forbidden: ILIKE (use LIKE instead — SQLite
  LIKE is case-insensitive for ASCII by default). Forbidden: REGEXP without explicit
  extension. Forbidden: NOW() / CURRENT_DATE functions not in SQLite (use DATE(''now'')
  or omit). Forbidden: string concatenation with || is OK but CONCAT() is not. For
  case-insensitive exact match use LOWER() on both sides: `WHERE LOWER(brand) = LOWER(''value'')`.
  For fuzzy match use `WHERE col LIKE ''%term%''`. Never write ILIKE in any query.'
